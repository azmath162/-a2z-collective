<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --bg-elevated: #111; --bg-card: #161616; --surface: #1a1a1a;
  --border: #222; --text: #e8e4de; --text-muted: #7a756d; --text-dim: #4a4640;
  --accent: #f09020; --teal: #2dd4bf; --text-soft: #b0aba3; --white: #faf8f5;
  --font-display: 'Bebas Neue', sans-serif; --font-body: 'Barlow', sans-serif;
  --nav-height: 72px; --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
}
html { font-size: 16px; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-body); font-weight: 300; color: var(--text); background: var(--bg); line-height: 1.6; overflow-x: hidden; min-height: 100vh; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { border: none; background: none; cursor: pointer; color: inherit; font-family: inherit; }

#site-header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(1.5rem, 4vw, 3rem); z-index: 100;
  background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.6) 70%, transparent 100%);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  transition: transform 0.4s var(--ease-out);
}
#site-header.header-hidden { transform: translateY(-100%); }
.logo { font-family: var(--font-display); font-size: clamp(1.6rem, 3vw, 2rem); letter-spacing: 0.08em; color: var(--white); transition: opacity 0.3s; }
.logo span, .logo .logo-collective { color: var(--text-soft); margin-left: 0.35em; }
.logo .logo-2 { color: var(--accent); margin: 0 -0.02em; display: inline-block; transform: scaleX(0.65) scaleY(0.75); font-size: 0.75em; vertical-align: middle; border-bottom: 2px solid var(--accent); padding-bottom: 1px; line-height: 0.9; }
.logo:hover { opacity: 0.8; }
#main-nav { display: flex; gap: 2rem; align-items: center; }
.nav-link { font-family: var(--font-body); font-weight: 500; font-size: 0.82rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); transition: color 0.3s; position: relative; }
.nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s var(--ease-out); }
.nav-link:hover, .nav-link.active { color: var(--white); }
.nav-link:hover::after, .nav-link.active::after { width: 100%; }
#menu-toggle { display: none; flex-direction: column; gap: 5px; padding: 8px; z-index: 110; }
#menu-toggle span { display: block; width: 24px; height: 1.5px; background: var(--white); transition: all 0.3s var(--ease-out); }
#menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 5px); }
#menu-toggle.active span:nth-child(2) { opacity: 0; }
#menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -5px); }
#mobile-menu { position: fixed; inset: 0; background: rgba(10,10,10,0.97); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 105; opacity: 0; pointer-events: none; transition: opacity 0.4s var(--ease-out); }
#mobile-menu.open { opacity: 1; pointer-events: auto; }
#mobile-menu nav { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
#mobile-menu .nav-link { font-family: var(--font-display); font-size: 2.4rem; letter-spacing: 0.06em; color: var(--text-muted); }
#mobile-menu .nav-link:hover, #mobile-menu .nav-link.active { color: var(--white); }
@media (max-width: 768px) { #main-nav { display: none; } #menu-toggle { display: flex; } }

#app { min-height: 100vh; padding-top: var(--nav-height); }
.page-enter { animation: fadeInUp 0.6s var(--ease-out) forwards; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

.hero { padding: clamp(4rem, 12vh, 8rem) clamp(1.5rem, 4vw, 3rem) clamp(2rem, 6vh, 4rem); text-align: center; }
.hero-title { font-family: var(--font-display); font-size: clamp(3.2rem, 10vw, 7rem); line-height: 0.95; letter-spacing: 0.04em; color: var(--white); margin-bottom: 1rem; }
.hero-tagline { font-weight: 300; font-size: clamp(0.85rem, 1.5vw, 1.05rem); letter-spacing: 0.25em; text-transform: uppercase; color: var(--teal); }
.hero-rule { width: 80px; height: 1px; background: var(--accent); margin: 2rem auto 0; }

.category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2px; padding: 0 2px 2px; }
.category-card { position: relative; aspect-ratio: 4/3; overflow: hidden; cursor: pointer; background: var(--bg-card); display: block; }
.category-card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s var(--ease-out), filter 0.6s; filter: brightness(0.5) saturate(0.9); }
.category-card:hover .category-card-img { transform: scale(1.05); filter: brightness(0.65) saturate(1); }
.category-card-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: clamp(1.5rem, 3vw, 2.5rem); background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%); }
.category-card-title { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.6rem); letter-spacing: 0.06em; color: var(--white); margin-bottom: 0.3rem; }
.category-card-count { font-size: 0.78rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
.category-card-arrow { position: absolute; top: 1.5rem; right: 1.5rem; width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--white); opacity: 0; transform: translate(-8px, 8px); transition: all 0.4s var(--ease-out); }
.category-card:hover .category-card-arrow { opacity: 1; transform: translate(0, 0); }

.category-header { padding: clamp(3rem, 8vh, 6rem) clamp(1.5rem, 4vw, 3rem) clamp(1.5rem, 4vh, 3rem); text-align: center; }
.category-back { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1.5rem; transition: color 0.3s; }
.category-back:hover { color: var(--accent); }
.category-back svg { width: 14px; height: 14px; }
.category-name { font-family: var(--font-display); font-size: clamp(2.6rem, 7vw, 5rem); letter-spacing: 0.04em; color: var(--white); margin-bottom: 0.5rem; }
.category-desc { font-weight: 300; font-size: 0.95rem; color: var(--text-muted); max-width: 500px; margin: 0 auto; }

.year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2px; padding: 0 2px 2px; }
.year-card { position: relative; aspect-ratio: 4/3; overflow: hidden; cursor: pointer; background: var(--bg-card); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 0.4s; }
.year-card:hover { background: var(--bg-elevated); }
.year-card-year { font-family: var(--font-display); font-size: clamp(3rem, 7vw, 4.5rem); color: var(--accent); letter-spacing: 0.04em; transition: transform 0.4s var(--ease-out); }
.year-card:hover .year-card-year { transform: scale(1.08); }
.year-card-count { font-size: 0.75rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-top: 0.3rem; }

.gallery-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2px; padding: 0 2px 2px; }
.gallery-card { position: relative; aspect-ratio: 16/10; overflow: hidden; cursor: pointer; background: var(--bg-card); display: block; }
.gallery-card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s var(--ease-out), filter 0.6s; filter: brightness(0.55); }
.gallery-card:hover .gallery-card-img { transform: scale(1.05); filter: brightness(0.7); }
.gallery-card-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: clamp(1.2rem, 2.5vw, 2rem); background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 50%); }
.gallery-card-title { font-family: var(--font-display); font-size: clamp(1.3rem, 3vw, 1.8rem); letter-spacing: 0.04em; color: var(--white); margin-bottom: 0.15rem; }
.gallery-card-date { font-size: 0.72rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }

.gallery-header { padding: clamp(3rem, 8vh, 6rem) clamp(1.5rem, 4vw, 3rem) clamp(1rem, 3vh, 2rem); text-align: center; }
.gallery-title { font-family: var(--font-display); font-size: clamp(2.2rem, 6vw, 4rem); letter-spacing: 0.04em; color: var(--white); margin-bottom: 0.4rem; }
.gallery-date { font-size: 0.8rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
.gallery-description { font-weight: 300; font-size: 0.95rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }

.video-section { max-width: 960px; margin: 0 auto; padding: 1rem clamp(1.5rem, 4vw, 3rem) 2rem; }
.video-embed { position: relative; padding-bottom: 56.25%; margin-bottom: 1.5rem; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
.video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.video-title { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

.masonry { column-count: 3; column-gap: 2px; padding: 0 2px 2px; }
.masonry-item { break-inside: avoid; margin-bottom: 2px; cursor: pointer; position: relative; overflow: hidden; background: var(--bg-card); }
.masonry-item img { width: 100%; display: block; transition: transform 0.6s var(--ease-out), filter 0.4s; filter: brightness(0.92); }
.masonry-item:hover img { transform: scale(1.03); filter: brightness(1); }
.masonry-item-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem 1rem 1rem; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%); font-size: 0.75rem; font-weight: 400; letter-spacing: 0.08em; color: rgba(255,255,255,0.8); opacity: 0; transform: translateY(8px); transition: all 0.3s var(--ease-out); }
.masonry-item:hover .masonry-item-caption { opacity: 1; transform: translateY(0); }
@media (max-width: 1024px) { .masonry { column-count: 2; } }
@media (max-width: 600px) { .masonry { column-count: 1; } }

.empty-state { text-align: center; padding: clamp(4rem, 12vh, 8rem) 2rem; }
.empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
.empty-state-text { font-size: 0.9rem; color: var(--text-dim); max-width: 380px; margin: 0 auto; line-height: 1.7; }

.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.35s var(--ease-out); }
.lightbox.open { opacity: 1; pointer-events: auto; }
.lb-content { position: relative; max-width: 92vw; max-height: 90vh; display: flex; flex-direction: column; align-items: center; }
#lb-img { max-width: 92vw; max-height: 85vh; object-fit: contain; transition: opacity 0.25s; user-select: none; }
#lb-caption { margin-top: 1rem; font-size: 0.8rem; font-weight: 300; letter-spacing: 0.06em; color: var(--text-muted); }
#lb-counter { margin-top: 0.4rem; font-size: 0.7rem; letter-spacing: 0.15em; color: var(--text-dim); }
.lb-close { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 2rem; color: var(--text-muted); z-index: 210; transition: color 0.3s; line-height: 1; }
.lb-close:hover { color: var(--white); }
.lb-prev, .lb-next { position: absolute; top: 50%; transform: translateY(-50%); font-size: 1.6rem; color: var(--text-muted); z-index: 210; padding: 1rem; transition: color 0.3s; }
.lb-prev:hover, .lb-next:hover { color: var(--white); }
.lb-prev { left: 1rem; }
.lb-next { right: 1rem; }

#site-footer { border-top: 1px solid var(--border); padding: 2.5rem clamp(1.5rem, 4vw, 3rem); margin-top: 4rem; }
.footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
.footer-copy { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }
.footer-social { display: flex; gap: 1.5rem; }
.social-icon { display: inline-flex; align-items: center; color: var(--text-muted); transition: color 0.3s; }
.social-icon:hover { color: var(--accent); }
.social-icon svg { width: 18px; height: 18px; }
.footer-social .social-icon svg { width: 16px; height: 16px; }
.footer-social a { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); transition: color 0.3s; }
.footer-social a:hover { color: var(--accent); }

.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s var(--ease-out), transform 0.6s var(--ease-out); }
.reveal.visible { opacity: 1; transform: translateY(0); }
.img-loading { background: var(--bg-card); min-height: 200px; }
.img-loaded { animation: imgFadeIn 0.5s var(--ease-out) forwards; }
@keyframes imgFadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

  "use strict";
  var app = document.getElementById("app");

  function init() { buildNav(); buildFooter(); bindEvents(); route(); }

  function buildNav() {
    var links = SITE_CONFIG.categories.map(function(c) {
      return '<a href="#/category/' + c.id + '" class="nav-link" data-section="' + c.id + '">' + c.name + '</a>';
    }).join("");
    mainNav.insertAdjacentHTML("beforeend", links);
    mobileMenu.querySelector("nav").insertAdjacentHTML("beforeend", links);
  }

  function setActiveNav(section) {
    document.querySelectorAll(".nav-link").forEach(function(l) { l.classList.toggle("active", l.dataset.section === section); });
  }

  function buildFooter() {
    footerText.textContent = SITE_CONFIG.footer;
    var s = SITE_CONFIG.social, h = "";
    if (s.instagram) h += '<a href="' + s.instagram + '" target="_blank" rel="noopener" class="social-icon" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg></a>';

    if (s.email) h += '<a href="mailto:' + s.email + '">Contact</a>';
    footerSocial.innerHTML = h;
  }

  function bindEvents() {
    window.addEventListener("hashchange", route);
    menuToggle.addEventListener("click", function() {
      menuToggle.classList.toggle("active"); mobileMenu.classList.toggle("open");
      document.body.style.overflow = mobileMenu.classList.contains("open") ? "hidden" : "";
    });
    mobileMenu.addEventListener("click", function(e) {
      if (e.target.classList.contains("nav-link")) { menuToggle.classList.remove("active"); mobileMenu.classList.remove("open"); document.body.style.overflow = ""; }

    window.addEventListener("scroll", function() {
      var c = window.scrollY;
      if (c > 120 && c > lastScroll) header.classList.add("header-hidden"); else header.classList.remove("header-hidden");
      lastScroll = c;
    }, { passive: true });
    document.querySelector(".lb-close").addEventListener("click", closeLightbox);
    document.querySelector(".lb-prev").addEventListener("click", function() { navigateLightbox(-1); });
    document.querySelector(".lb-next").addEventListener("click", function() { navigateLightbox(1); });
    document.getElementById("lightbox").addEventListener("click", function(e) { if (e.target.id === "lightbox" || e.target.classList.contains("lb-content")) closeLightbox(); });
    document.addEventListener("keydown", function(e) {
      if (!document.getElementById("lightbox").classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox(); if (e.key === "ArrowLeft") navigateLightbox(-1); if (e.key === "ArrowRight") navigateLightbox(1);
    });
  }

  function countAllGalleries(cat) {
    if (cat.yearGrouped) {
      var total = 0;
      (cat.years || []).forEach(function(y) { total += y.galleries.length; });
      return total;
    }
    return (cat.galleries || []).length;
  }

  /* ── ROUTER ── */
  function route() {
    var hash = window.location.hash || "#/";
    var parts = hash.replace("#/", "").split("/").filter(Boolean);
    window.scrollTo(0, 0);

    if (parts.length === 0) {
      renderHome(); setActiveNav("home"); return;
    }

    if (parts[0] === "category" && parts[1]) {
      var cat = SITE_CONFIG.categories.find(function(c) { return c.id === parts[1]; });
      if (!cat) { renderHome(); setActiveNav("home"); return; }

      setActiveNav(cat.id);

      if (cat.yearGrouped) {
        if (parts[2] && parts[3]) {
          var yr = (cat.years || []).find(function(y) { return y.year === parts[2]; });
          var gal = yr && yr.galleries.find(function(g) { return g.id === parts[3]; });
          if (gal) { renderGallery(cat, gal, parts[2]); return; }
        }
        if (parts[2]) {
          var yr2 = (cat.years || []).find(function(y) { return y.year === parts[2]; });
          if (yr2) { renderYearGalleries(cat, yr2); return; }
        }
        renderYears(cat); return;
      } else {
        if (parts[2]) {
          var gal2 = (cat.galleries || []).find(function(g) { return g.id === parts[2]; });
          if (gal2) { renderGallery(cat, gal2, null); return; }
        }
        renderCategory(cat); return;
      }
    }

    renderHome(); setActiveNav("home");
  }

  /* ── HOME ── */
  function renderHome() {
    var h = '<div class="page-enter"><section class="hero"><h1 class="hero-title">A<span style="color:var(--accent);display:inline-block;transform:scaleX(0.65) scaleY(0.75);font-size:0.75em;vertical-align:middle;margin:0 -0.02em;border-bottom:2px solid var(--accent);padding-bottom:1px;line-height:0.9">2</span>Z <span style="color:var(--text-soft)">Collective</span></h1><p class="hero-tagline">' + SITE_CONFIG.tagline + '</p><div class="hero-rule"></div></section><section class="category-grid">';
    SITE_CONFIG.categories.forEach(function(cat) {
      var n = countAllGalleries(cat);
      var t = n === 0 ? "Coming soon" : n + (n === 1 ? " gallery" : " galleries");
      h += '<a href="#/category/' + cat.id + '" class="category-card reveal"><img class="category-card-img img-loading" data-src="' + cat.cover + '" alt="' + cat.name + '" onerror="this.style.display=\'none\'"><div class="category-card-overlay"><h2 class="category-card-title">' + cat.name + '</h2><p class="category-card-count">' + t + '</p></div><div class="category-card-arrow">\u2192</div></a>';
    });
    h += '</section></div>'; app.innerHTML = h; observeImages(); observeReveal();
  }

  /* ── YEAR CARDS (for yearGrouped categories) ── */
  function renderYears(cat) {
    var years = (cat.years || []).slice().sort(function(a, b) { return b.year.localeCompare(a.year); });
    var h = '<div class="page-enter"><section class="category-header"><a href="#/" class="category-back">' + backSvg + 'All Categories</a><h1 class="category-name">' + cat.name + '</h1><p class="category-desc">' + cat.description + '</p></section>';

    if (years.length === 0) {
      h += '<div class="empty-state"><div class="empty-state-icon">&#128247;</div><p class="empty-state-text">No galleries yet.</p></div>';
    } else {
      h += '<section class="year-grid">';
      years.forEach(function(yr) {
        var n = yr.galleries.length;
        var t = n + (n === 1 ? " gallery" : " galleries");
        h += '<a href="#/category/' + cat.id + '/' + yr.year + '" class="year-card reveal"><span class="year-card-year">' + yr.year + '</span><span class="year-card-count">' + t + '</span></a>';
      });
      h += '</section>';
    }
    h += '</div>'; app.innerHTML = h; observeImages(); observeReveal();
  }

  /* ── GALLERIES WITHIN A YEAR ── */
  function renderYearGalleries(cat, yr) {
    var h = '<div class="page-enter"><section class="category-header"><a href="#/category/' + cat.id + '" class="category-back">' + backSvg + cat.name + '</a><h1 class="category-name">' + cat.name + ' <span style="color:var(--accent)">' + yr.year + '</span></h1></section>';

    if (yr.galleries.length === 0) {
      h += '<div class="empty-state"><div class="empty-state-icon">&#128247;</div><p class="empty-state-text">No galleries yet for ' + yr.year + '.</p></div>';
    } else {
      h += '<section class="gallery-list">';
      yr.galleries.forEach(function(g) {
        var d = g.date ? formatDate(g.date) : "";
        h += '<a href="#/category/' + cat.id + '/' + yr.year + '/' + g.id + '" class="gallery-card reveal"><img class="gallery-card-img img-loading" data-src="' + g.cover + '" alt="' + g.title + '" onerror="this.style.display=\'none\'"><div class="gallery-card-overlay"><h3 class="gallery-card-title">' + g.title + '</h3>' + (d ? '<p class="gallery-card-date">' + d + '</p>' : '') + '</div></a>';
      });
      h += '</section>';
    }
    h += '</div>'; app.innerHTML = h; observeImages(); observeReveal();
  }

  /* ── CATEGORY (non-yearGrouped) ── */
  function renderCategory(cat) {
    var h = '<div class="page-enter"><section class="category-header"><a href="#/" class="category-back">' + backSvg + 'All Categories</a><h1 class="category-name">' + cat.name + '</h1><p class="category-desc">' + cat.description + '</p></section>';
    if ((cat.galleries || []).length === 0) {
      h += '<div class="empty-state"><div class="empty-state-icon">&#128247;</div><p class="empty-state-text">No galleries yet.</p></div>';
    } else {
      h += '<section class="gallery-list">';
      cat.galleries.forEach(function(g) {
        var d = g.date ? formatDate(g.date) : "";
        h += '<a href="#/category/' + cat.id + '/' + g.id + '" class="gallery-card reveal"><img class="gallery-card-img img-loading" data-src="' + g.cover + '" alt="' + g.title + '" onerror="this.style.display=\'none\'"><div class="gallery-card-overlay"><h3 class="gallery-card-title">' + g.title + '</h3>' + (d ? '<p class="gallery-card-date">' + d + '</p>' : '') + '</div></a>';
      });
      h += '</section>';
    }
    h += '</div>'; app.innerHTML = h; observeImages(); observeReveal();
  }

  /* ── GALLERY (images) ── */
  function renderGallery(cat, gal, yearStr) {
    var backUrl = cat.yearGrouped ? "#/category/" + cat.id + "/" + yearStr : "#/category/" + cat.id;
    var backLabel = cat.yearGrouped ? cat.name + " " + yearStr : cat.name;
    var d = gal.date ? formatDate(gal.date) : "";
    var h = '<div class="page-enter"><section class="gallery-header"><a href="' + backUrl + '" class="category-back">' + backSvg + backLabel + '</a><h1 class="gallery-title">' + gal.title + '</h1>' + (d ? '<p class="gallery-date">' + d + '</p>' : '') + (gal.description ? '<p class="gallery-description">' + gal.description + '</p>' : '') + '</section>';
    if (gal.videos && gal.videos.length > 0) {
      h += '<section class="video-section">';
      gal.videos.forEach(function(v) { var u = getEmbedUrl(v.url); if (u) h += '<div class="video-embed"><iframe src="' + u + '" allowfullscreen loading="lazy"></iframe></div>' + (v.title ? '<p class="video-title">' + v.title + '</p>' : ''); });
      h += '</section>';
    }
    if (gal.images && gal.images.length > 0) {
      h += '<section class="masonry">';
      gal.images.forEach(function(img, i) {
        var src = gal.folder + '/' + img, cap = filenameToCaption(img);
        h += '<div class="masonry-item reveal" onclick="A2Z.openLightbox(' + i + ')"><img class="img-loading" data-src="' + src + '" alt="' + cap + '">' + (cap ? '<div class="masonry-item-caption">' + cap + '</div>' : '') + '</div>';
      });
      h += '</section>';
    } else {
      h += '<div class="empty-state"><div class="empty-state-icon">&#128247;</div><p class="empty-state-text">No images yet.</p></div>';
    }
    h += '</div>'; app.innerHTML = h; window._currentGallery = gal; observeImages(); observeReveal();
  }

  /* ── LIGHTBOX ── */
  var lbIndex = 0;
  window.A2Z = { openLightbox: function(i) { var g = window._currentGallery; if (!g || !g.images) return; lbIndex = i; showLB(); document.getElementById("lightbox").classList.add("open"); document.body.style.overflow = "hidden"; } };
  function showLB() {
    var g = window._currentGallery, img = document.getElementById("lb-img"), src = g.folder + '/' + g.images[lbIndex];
    img.style.opacity = "0"; img.onload = function() { img.style.opacity = "1"; }; img.src = src;
    img.alt = filenameToCaption(g.images[lbIndex]);
    document.getElementById("lb-caption").textContent = filenameToCaption(g.images[lbIndex]);
    document.getElementById("lb-counter").textContent = (lbIndex + 1) + " / " + g.images.length;
  }
  function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); document.body.style.overflow = ""; }
  function navigateLightbox(dir) { var g = window._currentGallery; if (!g) return; lbIndex = (lbIndex + dir + g.images.length) % g.images.length; showLB(); }

  function observeImages() {
    var imgs = document.querySelectorAll("img[data-src]");
    var obs = new IntersectionObserver(function(entries) { entries.forEach(function(e) { if (e.isIntersecting) { var img = e.target; img.src = img.dataset.src; img.removeAttribute("data-src"); img.classList.remove("img-loading"); img.addEventListener("load", function() { img.classList.add("img-loaded"); }, { once: true }); obs.unobserve(img); } }); }, { rootMargin: "200px" });
    imgs.forEach(function(img) { obs.observe(img); });
  }

  function observeReveal() {
    var items = document.querySelectorAll(".reveal");
    var obs = new IntersectionObserver(function(entries) { entries.forEach(function(e, i) { if (e.isIntersecting) { setTimeout(function() { e.target.classList.add("visible"); }, i * 60); obs.unobserve(e.target); } }); }, { threshold: 0.05, rootMargin: "40px" });
    items.forEach(function(el) { obs.observe(el); });
  }

  function formatDate(s) { var d = new Date(s + "T00:00:00"); return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }); }
  function filenameToCaption(f) { return f.replace(/\.[^.]+$/, "").replace(/^\d+[-_]/, "").replace(/[-_]/g, " ").replace(/\b\w/g, function(c) { return c.toUpperCase(); }); }
  function getEmbedUrl(url) { var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/); if (m) return "https://www.youtube-nocookie.com/embed/" + m[1]; m = url.match(/vimeo\.com\/(\d+)/); if (m) return "https://player.vimeo.com/video/" + m[1] + "?dnt=1"; return null; }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init); else init();
})();
</script>
</body>
</html>
